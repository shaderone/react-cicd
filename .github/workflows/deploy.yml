name: React-app-mulearn Native Deploy Pipeline

on:
  push:
    branches: ["main"]

# These permissions are required specifically for deploying directly to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple builds from running at exactly the same time and crashing into each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # We specify this is a 'github-pages' environment deployment.
    # This automatically gives us that nice link in the Actions tab.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build the app
        run: npm run build
        
      - name: Setup GitHub Pages natively
        uses: actions/configure-pages@v4
        
      - name: Upload the dist folder as an artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This takes everything Vite outputs and bundles it into a zip package
          path: './dist'
          
      - name: Deploy the artifact directly to the GitHub Pages environment
        id: deployment
        uses: actions/deploy-pages@v4